{% extends 'portal/student_base.html' %}
{% block title %}Change Password – GUCPC{% endblock %}
{% block content %}

<div class="page-header">
  <h2 class="page-title"><i class="fas fa-key"></i> Change Password</h2>
  <p class="page-subtitle">Update your account password</p>
</div>

<div class="card" style="max-width:480px;">
  <div class="card-body">
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="current_password" class="form-input" placeholder="Current password" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="new_password" class="form-input" placeholder="New password (min 6 chars)" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="confirm_password" class="form-input" placeholder="Confirm new password" required>
        </div>
      </div>
      <button type="submit" class="btn-login" style="margin-top:8px;">
        <i class="fas fa-save"></i> Update Password
      </button>
    </form>
  </div>
</div>

{% endblock %}
